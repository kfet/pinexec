name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test (go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 1.21 = declared floor in go.mod; 1.26 = latest stable.
        go: ["1.21", "1.26"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          check-latest: true
          # pinexec has no runtime deps and therefore no go.sum.
          # Disable setup-go's module cache to silence the
          # "Dependencies file is not found" warning.
          cache: false
      - run: go version
      # make all runs gofmt + vet + (staticcheck if present) + race +
      # shuffle + 100% coverage gate.
      - run: make all
        env:
          GOTOOLCHAIN: auto
